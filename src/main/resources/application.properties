spring.application.name=aiintegration

# OpenAI Configuration
openai.api.key=${OPENAI_API_KEY}

# JWT Security Configuration
jwt.secret=${JWT_SECRET:your-secret-key-change-in-production-at-least-256-bits}
jwt.expiration=${JWT_EXPIRATION:3600000}

# Rate Limiting Configuration
resilience4j.ratelimiter.configs.default.registerHealthIndicator=true
resilience4j.ratelimiter.configs.default.limitForPeriod=100
resilience4j.ratelimiter.configs.default.limitRefreshPeriod=1m
resilience4j.ratelimiter.configs.default.timeoutDuration=5s
resilience4j.ratelimiter.instances.aiapi.baseConfig=default
