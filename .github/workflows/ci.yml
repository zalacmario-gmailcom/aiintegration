name: Java CI with Gradle

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build --info

      - name: Run Unit Tests
        run: ./gradlew test --info

      # SECURITY: OWASP Dependency-Check - Scan for vulnerable dependencies
      - name: Run OWASP Dependency-Check
        run: ./gradlew dependencyCheckAnalyze --info
        continue-on-error: false

      # SECURITY: Upload dependency check reports
      - name: Upload Dependency-Check Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: dependency-check-report
          path: build/reports/dependency-check/

      # SECURITY: Fail build if critical vulnerabilities found
      - name: Check Dependency-Check Results
        if: always()
        run: |
          if [ -f build/reports/dependency-check/dependency-check-report.json ]; then
            HIGH_VULNS=$(grep -o '"severity":"HIGH"' build/reports/dependency-check/dependency-check-report.json | wc -l)
            CRITICAL_VULNS=$(grep -o '"severity":"CRITICAL"' build/reports/dependency-check/dependency-check-report.json | wc -l)
            if [ $CRITICAL_VULNS -gt 0 ] || [ $HIGH_VULNS -gt 3 ]; then
              echo " SECURITY ALERT: Found $CRITICAL_VULNS CRITICAL and $HIGH_VULNS HIGH severity vulnerabilities"
              exit 1
            fi
          fi

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-reports
          path: build/reports/tests/test/

      - name: Publish Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: build/test-results/test/TEST-*.xml
          check_name: Unit Test Results

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: my-spring-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max